<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>xcsh</title>
<style>
  body{font:14px/1.6 Inter,system-ui,sans-serif;max-width:480px;margin:40px auto;padding:0 16px;color:#1a1a2e}
  h1{font-size:20px;color:#E4002B;display:flex;align-items:center;gap:8px;margin-bottom:4px}
  h2{font-size:14px;text-transform:uppercase;letter-spacing:.04em;color:#666;margin:24px 0 8px}
  .status{padding:12px;border-radius:8px;background:#f5f5f5;margin:16px 0;display:flex;align-items:center}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:8px;flex:none}
  .green{background:#22c55e}.red{background:#ef4444}
  ul{margin:0;padding-left:20px}
  code{background:#f0f0f0;padding:1px 5px;border-radius:4px;font-size:13px}
  footer{color:#666;font-size:12px;margin-top:24px;border-top:1px solid #eee;padding-top:12px}
</style>
</head>
<body>
  <h1><img src="icons/icon-48.png" width="32" height="32" alt=""> xcsh</h1>
  <div class="status" id="status"><span class="dot"></span>Checking connection&hellip;</div>
  <h2>Console domains</h2>
  <ul>
    <li><code>*.volterra.us</code></li>
    <li><code>*.console.ves.volterra.io</code></li>
  </ul>
  <footer>v<span id="ver">0.1.0</span> &middot; powered by xcsh</footer>
  <script src="options.js"></script>
</body>
</html>
