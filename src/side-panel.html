<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>xcsh chat</title>
<style>
  :root { --bg:#0a0d11; --panel:#0e1217; --line:#1c232c; --red:#ca260a; --fg:#e8ecf4; --dim:#8a93a3; }
  * { box-sizing: border-box; }
  html,body { margin:0; height:100%; }
  body { background:var(--bg); color:var(--fg);
    font:13px/1.5 'JetBrains Mono', ui-monospace, Menlo, monospace;
    display:flex; flex-direction:column; }
  header { display:flex; align-items:center; gap:8px; padding:10px 12px; border-bottom:1px solid var(--line); }
  header .mark { color:var(--red); font-weight:700; letter-spacing:.05em; }
  .dot { width:8px; height:8px; border-radius:50%; background:#ef4444; margin-left:auto; }
  .dot.on { background:#22c55e; }
  #mode { background:var(--panel); color:var(--fg); border:1px solid var(--line); border-radius:6px; padding:4px 8px;
    font:inherit; font-size:12px; cursor:pointer; }
  #mode:hover { border-color:var(--red); }
  .chip { display:flex; align-items:center; gap:8px; padding:6px 12px; border-bottom:1px solid var(--line);
    color:var(--dim); font-size:12px; }
  .chip .title { color:var(--fg); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .chip button { margin-left:auto; background:none; border:1px solid var(--line); color:var(--dim);
    border-radius:6px; padding:2px 8px; cursor:pointer; font:inherit; }
  .chip button + button { margin-left:6px; }
  #messages { flex:1; overflow:auto; padding:12px; display:flex; flex-direction:column; gap:12px; }
  .msg { white-space:normal; }
  .msg .who { color:var(--dim); font-size:11px; text-transform:uppercase; letter-spacing:.06em; margin-bottom:3px; }
  .msg.user .body { color:#cfe3ff; }
  .msg.tool { border-left:2px solid var(--red); padding-left:8px; color:var(--dim); font-size:11px; }
  .msg.error { border:1px solid var(--red); border-radius:6px; padding:8px; background:rgba(202,38,10,0.1); }
  .msg pre.code { background:#05070a; border:1px solid var(--line); border-radius:6px; padding:8px; overflow:auto; }
  .msg code { background:#05070a; padding:1px 5px; border-radius:4px; }
  .msg a { color:#5aa9ff; }
  .thinking { color:var(--dim); font-size:12px; animation:pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }
  .conn-banner { background:#2a0d0d; color:#ff6b6b; border-bottom:1px solid var(--red); padding:6px 12px; font:12px/1.4 'JetBrains Mono', ui-monospace, Menlo, monospace; text-align:center; }
  .copy-btn { display:inline-block; margin-left:8px; padding:2px 6px; background:none; border:1px solid var(--dim);
    color:var(--dim); border-radius:4px; cursor:pointer; font:inherit; font-size:11px; }
  .copy-btn:hover { color:var(--fg); border-color:var(--fg); }
  .ref-chip { display:inline-block; margin:4px 6px 0 0; padding:2px 8px; border:1px solid var(--line);
    border-radius:999px; color:var(--fg); text-decoration:none; font-size:12px; }
  details#refs { border-top:1px solid var(--line); padding:8px 12px; color:var(--dim); }
  details#refs[open] { background:var(--panel); }
  details#refs a { display:block; color:#5aa9ff; padding:2px 0; text-decoration:none; }
  form#composer { display:flex; gap:8px; padding:10px 12px; border-top:1px solid var(--line); }
  #input { flex:1; resize:none; min-height:38px; max-height:140px; background:var(--panel); color:var(--fg);
    border:1px solid var(--line); border-radius:8px; padding:8px 10px; font:inherit; }
  #send { background:var(--red); color:#fff; border:none; border-radius:8px; padding:0 14px; cursor:pointer; font:inherit; }
  #send:disabled { opacity:.5; cursor:default; }
  #stop { background:var(--red); color:#fff; border:none; border-radius:8px; padding:0 14px; cursor:pointer; font:inherit; display:none; }
</style>
</head>
<body>
  <header>
    <span class="mark">xcsh</span><span style="color:var(--dim)">chat</span>
    <select id="mode" title="conversation mode">
      <option value="educational">Educational</option>
      <option value="presentation">Presentation</option>
      <option value="configuration">Config building</option>
      <option value="screenshot">Screenshot</option>
      <option value="annotation">Annotation</option>
    </select>
    <span id="sess" style="font-size:11px;color:var(--dim);white-space:nowrap" title="xcsh session tenant"></span>
    <span class="dot" id="conn" title="bridge connection"></span>
  </header>
  <div class="chip">
    <span>▣</span><span class="title" id="ctx-chip">no page attached</span>
    <button id="ctx-refresh" type="button" title="refresh page context">↻</button>
    <button id="ctx-detach" type="button" title="detach page context">✕</button>
  </div>
  <div id="messages"></div>
  <details id="refs"><summary>References</summary><div id="refs-list"></div></details>
  <form id="composer">
    <textarea id="input" placeholder="ask xcsh about this page…" rows="1"></textarea>
    <button id="send" type="submit">send</button>
    <button id="stop" type="button">stop</button>
  </form>
  <script src="side-panel.js"></script>
</body>
</html>
