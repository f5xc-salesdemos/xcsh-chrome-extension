---
version: 2
updates:
  # --- GitHub Actions ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
    open-pull-requests-limit: 10
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # --- npm ---
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
    open-pull-requests-limit: 10
    groups:
      # First-party @f5xc-salesdemos/* packages: track latest daily, all update types
      # (auto-merged once CI is green) so internal deps never drift behind.
      f5-internal:
        patterns:
          - "@f5xc-salesdemos/*"
        update-types:
          - "major"
          - "minor"
          - "patch"
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
