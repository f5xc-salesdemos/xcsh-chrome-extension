name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run check:types

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Verify dist artifacts
        run: |
          set -e
          for f in manifest.json service-worker.js accessibility-tree.js agent-visual-indicator.js options.html options.js managed_schema.json; do
            test -f "dist/$f" || { echo "missing dist/$f"; exit 1; }
          done
          # manifest must NOT contain a 'key' field (Chrome Web Store assigns the ID)
          if grep -q '"key"' dist/manifest.json; then echo "manifest.json must not contain 'key' for CWS"; exit 1; fi
          echo "dist artifacts verified"
